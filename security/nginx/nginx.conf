events {}

http {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    upstream frontend_app { server frontend:5173; }
    upstream auth_api     { server auth-service:8000; }
    upstream task_api     { server task-service:8000; }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location /static/ {
            proxy_pass http://auth_api;
        }

        location /admin/ {
            proxy_pass http://auth_api;
        }

        location /api/health/ {
            proxy_pass http://task_api/api/health/;
        }

        location /api/tasks/ {
            proxy_pass http://task_api/api/tasks/;
        }

        location /api/completions/ {
            proxy_pass http://task_api/api/completions/;
        }

        location /api/ {
            proxy_pass http://auth_api/api/;
        }

        location / {
            proxy_pass http://frontend_app;
        }
    }
}
